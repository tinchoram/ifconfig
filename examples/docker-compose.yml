services:
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - hostone
      - hosttwo
    networks:
      - proxy_net

  hostone:
    image: tinchoram/ifconfig:0.3.1
    container_name: hostone
    environment:
      # Trust only the compose-managed proxy network defined below.
      - TRUSTED_PROXIES=172.28.0.0/16
    networks:
      - proxy_net

  hosttwo:
    image: tinchoram/ifconfig:0.3.1
    container_name: hosttwo
    environment:
      - TRUSTED_PROXIES=172.28.0.0/16
    networks:
      - proxy_net

networks:
  proxy_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  nginx_conf:
    driver: local
